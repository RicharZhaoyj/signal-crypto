<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>永续合约资金费率监控 · OKX · Signal</title>
<meta name="description" content="实时查看 OKX 永续合约资金费率。找出高正费率和高负费率品种，辅助永续合约交易决策。">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;background:linear-gradient(135deg,#0f0c29,#1a1a3e 40%,#24243e);color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1100px;margin:0 auto}
header{text-align:center;padding:30px 20px 20px}
h1{font-size:2em;background:linear-gradient(90deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.subtitle{color:#aaa;font-size:.95em;margin-bottom:15px}
.back-link{color:#667eea;text-decoration:none;font-size:.85em}
.back-link:hover{text-decoration:underline}
.nav{display:flex;gap:15px;justify-content:center;margin-bottom:25px;flex-wrap:wrap}
.nav a{color:#aaa;text-decoration:none;font-size:.9em;padding:6px 14px;border-radius:8px}
.nav a.active{color:#fff;background:rgba(102,126,234,.15)}
.section{background:rgba(255,255,255,.04);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:24px;margin-bottom:25px}
h2{font-size:1.25em;margin-bottom:16px;color:#fff;border-bottom:1px solid rgba(255,255,255,.08);padding-bottom:10px}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.9em}
thead th{background:rgba(255,255,255,.06);padding:12px 10px;text-align:center;font-weight:600;color:#aaa;border-bottom:1px solid rgba(255,255,255,.08)}
tbody td{padding:11px 10px;text-align:center;border-bottom:1px solid rgba(255,255,255,.05)}
tbody tr:hover{background:rgba(255,255,255,.03)}
.positive{color:#ff4d4f;font-weight:600}
.negative{color:#52c41a;font-weight:600}
.loading{color:#888;text-align:center;padding:30px}
.error{color:#ff4d4f}
.update-time{text-align:center;color:#666;font-size:.8em;margin-top:15px}
</style>
</head>
<body>
<div class="container">
  <a href="/" class="back-link">← 返回首页</a>
  
  <header>
    <h1>💰 资金费率监控</h1>
    <p class="subtitle">OKX 永续合约实时费率 · 高正费率 = 做空更划算 · 高负费率 = 做多更划算</p>
  </header>

  <div class="nav">
    <a href="/">📡 行情信号</a>
    <a href="/tools">🧮 交易工具</a>
    <a href="/compare">🏛️ 交易所对比</a>
    <a href="/funding" class="active">💰 资金费率</a>
  </div>

  <!-- 正费率 Top -->
  <div class="section">
    <h2>📈 正费率最高（适合做空）</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>合约</th>
            <th>资金费率</th>
            <th>预估年化</th>
            <th>更新时间</th>
          </tr>
        </thead>
        <tbody id="positiveTable">
          <tr><td colspan="5" class="loading">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- 负费率 Top -->
  <div class="section">
    <h2>📉 负费率最高（适合做多）</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>合约</th>
            <th>资金费率</th>
            <th>预估年化</th>
            <th>更新时间</th>
          </tr>
        </thead>
        <tbody id="negativeTable">
          <tr><td colspan="5" class="loading">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="update-time" id="updateTime"></div>

  <footer style="text-align:center;margin-top:40px;color:#555;font-size:.8em">
    数据来源：OKX 公开 API · 每 5 分钟更新
  </footer>
</div>

<script>
async function fetchFundingRates() {
  try {
    const res = await fetch('https://www.okx.com/api/v5/public/funding-rate?instType=SWAP');
    const data = await res.json();
    
    if (data.code !== '0' || !data.data) {
      throw new Error('数据获取失败');
    }

    const rates = data.data
      .map(item => ({
        symbol: item.instId.replace('-SWAP', ''),
        fundingRate: parseFloat(item.fundingRate) * 100,
        nextFunding: item.nextFundingTime,
        ts: item.fundingTime
      }))
      .filter(item => !isNaN(item.fundingRate));

    // 正费率排序（从高到低）
    const positive = [...rates].sort((a, b) => b.fundingRate - a.fundingRate).slice(0, 15);
    // 负费率排序（从低到高，即最负的排前面）
    const negative = [...rates].sort((a, b) => a.fundingRate - b.fundingRate).slice(0, 15);

    renderTable('positiveTable', positive, true);
    renderTable('negativeTable', negative, false);

    // 更新时间
    const now = new Date();
    document.getElementById('updateTime').innerHTML = `最后更新：${now.toLocaleTimeString('zh-CN')}`;

  } catch (err) {
    document.getElementById('positiveTable').innerHTML = '<tr><td colspan="5" class="error">数据加载失败，请稍后重试</td></tr>';
    document.getElementById('negativeTable').innerHTML = '<tr><td colspan="5" class="error">数据加载失败，请稍后重试</td></tr>';
  }
}

function renderTable(tbodyId, list, isPositive) {
  const tbody = document.getElementById(tbodyId);
  let html = '';

  list.forEach((item, i) => {
    const colorClass = isPositive ? 'positive' : 'negative';
    const sign = item.fundingRate >= 0 ? '+' : '';
    const annualized = (item.fundingRate * 3 * 365).toFixed(1); // 粗略年化（每天3次）

    html += `<tr>
      <td>${i + 1}</td>
      <td style="font-weight:600;color:#fff">${item.symbol}</td>
      <td class="${colorClass}">${sign}${item.fundingRate.toFixed(4)}%</td>
      <td class="${colorClass}">${sign}${annualized}%</td>
      <td style="font-size:0.8em;color:#888">${new Date(parseInt(item.ts)).toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'})}</td>
    </tr>`;
  });

  tbody.innerHTML = html;
}

// 初始加载
fetchFundingRates();

// 每 5 分钟自动刷新
setInterval(fetchFundingRates, 5 * 60 * 1000);
</script>
</body>
</html>
