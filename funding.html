<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>永续合约资金费率监控 · 多交易所 · Signal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans SC",sans-serif;background:linear-gradient(135deg,#0f0c29,#1a1a3e 40%,#24243e);color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1100px;margin:0 auto}
header{text-align:center;padding:25px 20px 15px}
h1{font-size:1.9em;background:linear-gradient(90deg,#667eea,#764ba2);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.subtitle{color:#aaa;font-size:.9em;margin-bottom:12px}
.back-link{color:#667eea;text-decoration:none;font-size:.82em}
.nav{display:flex;gap:12px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.nav a{color:#aaa;text-decoration:none;font-size:.85em;padding:6px 12px;border-radius:6px}
.nav a.active{color:#fff;background:rgba(102,126,234,.18)}
.controls{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.controls input,.controls select{padding:8px 12px;border:1px solid rgba(255,255,255,.1);border-radius:8px;background:rgba(255,255,255,.06);color:#e0e0e0;font-size:.9em}
.exchange-tabs{display:flex;gap:8px;margin-bottom:16px}
.exchange-tab{padding:8px 18px;border-radius:8px;background:rgba(255,255,255,.05);cursor:pointer;font-size:.9em;border:1px solid rgba(255,255,255,.08)}
.exchange-tab.active{background:rgba(102,126,234,.2);border-color:#667eea;color:#fff}
.section{background:rgba(255,255,255,.04);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:20px;margin-bottom:22px}
h2{font-size:1.15em;margin-bottom:14px;color:#fff}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.88em}
thead th{background:rgba(255,255,255,.06);padding:10px 8px;text-align:center;font-weight:600;color:#aaa;border-bottom:1px solid rgba(255,255,255,.08)}
tbody td{padding:9px 8px;text-align:center;border-bottom:1px solid rgba(255,255,255,.05)}
.positive{color:#ff4d4f;font-weight:600}
.negative{color:#52c41a;font-weight:600}
.badge{display:inline-block;background:rgba(82,196,26,.15);color:#52c41a;font-size:.72em;padding:1px 6px;border-radius:4px;margin-left:6px}
.loading{color:#888;text-align:center;padding:25px}
.error{color:#ff4d4f}
.update-time{text-align:center;color:#666;font-size:.78em;margin-top:12px}
</style>
</head>
<body>
<div class="container">
  <a href="/" class="back-link">← 返回首页</a>
  <header>
    <h1>💰 资金费率监控</h1>
    <p class="subtitle">多交易所实时费率 · 结合横盘信号发现机会</p>
  </header>

  <div class="nav">
    <a href="/">📡 行情信号</a>
    <a href="/tools">🧮 交易工具</a>
    <a href="/compare">🏛️ 交易所对比</a>
    <a href="/funding" class="active">💰 资金费率</a>
  </div>

  <div class="exchange-tabs">
    <div class="exchange-tab active" data-exchange="binance">Binance</div>
    <div class="exchange-tab" data-exchange="okx">OKX</div>
  </div>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="搜索币种（如 BTC）">
    <select id="sortSelect">
      <option value="rate-desc">费率从高到低</option>
      <option value="rate-asc">费率从低到高</option>
      <option value="symbol">币种 A-Z</option>
    </select>
  </div>

  <div class="section">
    <h2>📈 正费率最高（适合做空）</h2>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>合约</th><th>费率</th><th>年化</th><th>更新</th></tr></thead>
        <tbody id="positiveTable"><tr><td colspan="5" class="loading">加载中...</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="section">
    <h2>📉 负费率最高（适合做多）</h2>
    <div class="table-wrap">
      <table>
        <thead><tr><th>#</th><th>合约</th><th>费率</th><th>年化</th><th>更新</th></tr></thead>
        <tbody id="negativeTable"><tr><td colspan="5" class="loading">加载中...</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="update-time" id="updateTime"></div>
</div>

<script>
let sidewaysSymbols = new Set();
let currentExchange = 'binance';
let allRates = [];

async function loadSidewaysList() {
  try {
    const res = await fetch('/data.json');
    const data = await res.json();
    if (data.sideways) data.sideways.forEach(i => sidewaysSymbols.add(i.symbol.replace('-USDT','')));
  } catch(e){}
}

async function fetchFundingRates(exchange) {
  currentExchange = exchange;
  document.getElementById('positiveTable').innerHTML = '<tr><td colspan="5" class="loading">加载中...</td></tr>';
  document.getElementById('negativeTable').innerHTML = '<tr><td colspan="5" class="loading">加载中...</td></tr>';

  try {
    let rates = [];
    if (exchange === 'okx') {
      const res = await fetch('https://www.okx.com/api/v5/public/funding-rate?instType=SWAP');
      const data = await res.json();
      if (data.code === '0' && data.data) {
        rates = data.data.map(item => ({
          symbol: item.instId.split('-')[0],
          fundingRate: parseFloat(item.fundingRate)*100,
          ts: item.fundingTime || Date.now()
        })).filter(r => r.symbol && !isNaN(r.fundingRate));
      }
    } else {
      const res = await fetch('https://fapi.binance.com/fapi/v1/premiumIndex');
      const data = await res.json();
      if (Array.isArray(data)) {
        rates = data.map(item => ({
          symbol: item.symbol.replace('USDT',''),
          fundingRate: parseFloat(item.lastFundingRate)*100,
          ts: Date.now()
        })).filter(r => r.symbol && !isNaN(r.fundingRate));
      }
    }
    allRates = rates;
    renderTables();
    document.getElementById('updateTime').innerHTML = `数据来源：${exchange.toUpperCase()} · 更新于 ${new Date().toLocaleTimeString('zh-CN')}`;
  } catch (err) {
    const errHtml = '<tr><td colspan="5" class="error">加载失败（浏览器拦截）</td></tr>';
    document.getElementById('positiveTable').innerHTML = errHtml;
    document.getElementById('negativeTable').innerHTML = errHtml;
  }
}

function renderTables(filtered = null) {
  const list = filtered || allRates;
  if (!list.length) {
    const empty = '<tr><td colspan="5" style="color:#888;text-align:center;padding:20px">当前暂无费率数据</td></tr>';
    document.getElementById('positiveTable').innerHTML = empty;
    document.getElementById('negativeTable').innerHTML = empty;
    return;
  }
  const pos = [...list].sort((a,b)=>b.fundingRate-a.fundingRate).slice(0,18);
  const neg = [...list].sort((a,b)=>a.fundingRate-b.fundingRate).slice(0,18);
  renderTable('positiveTable', pos, true);
  renderTable('negativeTable', neg, false);
}

function renderTable(id, list, positive) {
  let html = '';
  list.forEach((item,i) => {
    const cls = positive ? 'positive' : 'negative';
    const sign = item.fundingRate >= 0 ? '+' : '';
    const ann = (item.fundingRate * 3 * 365).toFixed(1);
    const badge = sidewaysSymbols.has(item.symbol) ? `<span class="badge">横盘</span>` : '';
    html += `<tr><td>${i+1}</td><td style="font-weight:600;color:#fff">${item.symbol}${badge}</td><td class="${cls}">${sign}${item.fundingRate.toFixed(4)}%</td><td class="${cls}">${sign}${ann}%</td><td style="font-size:0.75em;color:#888">${new Date(item.ts).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}</td></tr>`;
  });
  document.getElementById(id).innerHTML = html;
}

document.getElementById('searchInput').addEventListener('input', () => {
  const kw = document.getElementById('searchInput').value.toUpperCase();
  const sort = document.getElementById('sortSelect').value;
  let filtered = allRates.filter(r => r.symbol.includes(kw));
  if (sort === 'rate-desc') filtered.sort((a,b)=>b.fundingRate-a.fundingRate);
  else if (sort === 'rate-asc') filtered.sort((a,b)=>a.fundingRate-b.fundingRate);
  else filtered.sort((a,b)=>a.symbol.localeCompare(b.symbol));
  renderTables(filtered);
});

document.querySelectorAll('.exchange-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.exchange-tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');
    fetchFundingRates(tab.dataset.exchange);
  });
});

async function init() {
  await loadSidewaysList();
  await fetchFundingRates('binance');
}
init();
</script>
</body>
</html>
