<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>加密货币实时行情分析 - Signal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            padding: 40px 20px;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
        }
        .update-time {
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 15px;
        }
        .section {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        h2 {
            font-size: 1.8em;
            margin-bottom: 20px;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            padding-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th {
            background: rgba(255,255,255,0.2);
            padding: 12px;
            text-align: left;
            font-weight: 600;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        tr:hover {
            background: rgba(255,255,255,0.05);
        }
        .warning {
            background: rgba(255,193,7,0.2);
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-top: 30px;
            border-radius: 5px;
        }
        footer {
            text-align: center;
            padding: 30px;
            opacity: 0.7;
            font-size: 0.9em;
        }
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .section { padding: 20px; }
            table { font-size: 0.9em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 加密货币实时行情分析</h1>
            <p class="subtitle">智能识别短期异动与横盘启动品种</p>
            <div class="update-time">⏰ 更新时间：2026-05-09 02:28:04</div>
        </header>
        
        <div class="section">
            <h2>📈 短期异动品种 (24h涨跌>±10%)</h2>
            <table>
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>交易对</th>
                        <th>价格</th>
                        <th>24h涨跌</th>
                        <th>成交量</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="5" style="text-align:center;">暂无数据</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="section">
            <h2>📊 横盘启动品种 (24h波动<5%)</h2>
            <table>
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>交易对</th>
                        <th>价格</th>
                        <th>波动率</th>
                        <th>24h涨跌</th>
                        <th>成交量</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td colspan="6" style="text-align:center;">暂无数据</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="warning">
            <strong>⚠️ 风险提示：</strong>加密货币风险极高，仅用闲钱投资（不超过总资产5%）！本分析仅供参考，不构成投资建议。
        </div>
        
        <footer>
            <p>Powered by Signal | 数据来源：OKX | 自动化分析系统</p>
        </footer>
    </div>
</body>
</html>
