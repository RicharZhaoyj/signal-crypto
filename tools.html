<script>
function n(v){return parseFloat(v)||0}
function fmt(n){if(Math.abs(n)>=1e6)return (n/1e6).toFixed(2)+'M';if(Math.abs(n)>=1e3)return (n/1e3).toFixed(2)+'K';return n.toFixed(2)}
// 合约计算器
function calcContract(){
  const dir=document.getElementById('contractDir').value;
  const entry=n(document.getElementById('entryPrice').value);
  const exit=n(document.getElementById('exitPrice').value);
  const cap=n(document.getElementById('capital').value);
  const lev=n(document.getElementById('leverage').value);
  if(!entry||!exit||!cap||!lev){document.getElementById('contractResult').innerHTML='<span style=color:#ff4d4f>⚠️ 请填写所有参数</span>';return}
  const posSize=cap*lev;
  const priceDiff=dir==='long'?exit-entry:entry-exit;
  const pnl=priceDiff/entry*posSize;
  const roi=pnl/cap*100;
  const pnlColor=pnl>=0?'green':'red';
  const roiColor=roi>=0?'green':'red';
  document.getElementById('contractResult').innerHTML=
    `<div>开仓价值: <span class=val>$${fmt(posSize)}</span> (本金 $${fmt(cap)} × ${lev}x)</div>`+
    `<div>盈亏: <span class=${pnlColor}>${pnl>=0?'+':''}$${fmt(Math.abs(pnl))}</span></div>`+
    `<div>ROI: <span class=${roiColor}>${roi>=0?'+':''}${roi.toFixed(2)}%</span></div>`+
    `<div style=font-size:.85em;color:#888;margin-top:6px>方向: ${dir==='long'?'做多':'做空'} | 价差: $${Math.abs(exit-entry).toFixed(2)}</div>`;
}
// 仓位计算器
function calcPosition(){
  const bal=n(document.getElementById('balance').value);
  const rp=n(document.getElementById('riskPct').value);
  const sp=n(document.getElementById('stopPct').value);
  const lev=n(document.getElementById('levPos').value);
  if(!bal||!rp||!sp||!lev){document.getElementById('posResult').innerHTML='<span style=color:#ff4d4f>⚠️ 请填写所有参数</span>';return}
  const maxLoss=bal*rp/100;
  const posSize=maxLoss/(sp/100);
  const usedCap=posSize/lev;
  const riskPct=bal?maxLoss/bal*100:0;
  document.getElementById('posResult').innerHTML=
    `<div>建议仓位价值: <span class=val>$${fmt(posSize)}</span></div>`+
    `<div>占用保证金: <span class=val>$${fmt(usedCap)}</span> (${lev}x杠杆)</div>`+
    `<div>最大亏损: <span class=red>-$${fmt(maxLoss)}</span> (${riskPct.toFixed(1)}% 账户)</div>`+
    `<div style=font-size:.85em;color:#888;margin-top:6px>建议: 单笔风险不超过账户 ${rp}%</div>`;
}
// 止损止盈计算器
function calcTP(){
  const dir=document.getElementById('tpDir').value;
  const entry=n(document.getElementById('tpEntry').value);
  const sl=n(document.getElementById('slPct').value);
  const tp=n(document.getElementById('tpPct').value);
  if(!entry||!sl||!tp){document.getElementById('tpResult').innerHTML='<span style=color:#ff4d4f>⚠️ 请填写所有参数</span>';return}
  let slPrice,tpPrice;
  if(dir==='long'){slPrice=entry*(1-sl/100);tpPrice=entry*(1+tp/100)}
  else{slPrice=entry*(1+sl/100);tpPrice=entry*(1-tp/100)}
  const slDir=dir==='long'?'低于':'高于';
  const tpDir=dir==='long'?'高于':'低于';
  document.getElementById('tpResult').innerHTML=
    `<div>🛑 止损价: <span class=red>$${slPrice.toFixed(2)}</span> (${slDir}开仓价 ${sl}%)</div>`+
    `<div>✅ 止盈价: <span class=green>$${tpPrice.toFixed(2)}</span> (${tpDir}开仓价 ${tp}%)</div>`+
    `<div style=font-size:.85em;color:#888;margin-top:6px>风报比: 1:${(tp/sl).toFixed(2)}</div>`;
}
